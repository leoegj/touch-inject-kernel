name: Build touch_inject.ko (GKI Action)

on:
  push:
  workflow_dispatch:

jobs:
  upload-artifact:
    name: Upload module source
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: touch_inject
          path: .github/touch_inject

  build:
    name: Build GKI module
    runs-on: ubuntu-22.04
    needs: upload-artifact
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build kernel module
        uses: feicong/android-kernel-build-action@v1.0.0
        with:
          arch: aarch64
          tag: android13-5.15
          module-name: touch_inject
          module-path: touch_inject
